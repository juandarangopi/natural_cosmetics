server {
    listen 8033;
    server_name _;

    root /usr/share/nginx/html;
    index landing_cosmetica.html;

    gzip on;
    gzip_types text/html text/css application/javascript application/json;

    # Ebook download page (protected — client accesses via ?license_key=)
    location = /download {
        try_files /ebook_download.html =404;
    }

    # Legal page
    location = /legal.html {
        try_files /legal.html =404;
    }

    # Serve the landing page
    location / {
        try_files $uri $uri/ /landing_cosmetica.html;
    }

    # Proxy API calls to the Python backend
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://backend:5033;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }
}
