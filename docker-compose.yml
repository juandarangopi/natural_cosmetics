services:
  frontend:
    image: nginx:1.27-alpine
    ports:
      - "8033:8033"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./landing_cosmetica.html:/usr/share/nginx/html/landing_cosmetica.html:ro
      - ./ebook_download.html:/usr/share/nginx/html/ebook_download.html:ro
      - ./uploads:/usr/share/nginx/html/uploads:ro
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    expose:
      - "5033"
    env_file:
      - .env
    restart: unless-stopped
